<!DOCTYPE html>
<html>
<head>
    <title>Random Number Roller</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: #f2f2f2;
        }

        h1 {
            margin-top: 30px;
        }

        #number {
            font-size: 60px;
            margin: 40px;
            color: #333;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>🎲 Random Number App</h1>
    <div id="number">0</div>
    <button onclick="handleClick()">Click Me</button>

    <script>
        let rolling = false;
        let clickCount = 0;
        let interval;

        function startRolling() {
            interval = setInterval(() => {
                document.getElementById("number").innerText =
                    Math.floor(Math.random() * 100);
            }, 100);
        }

        function stopRolling() {
            clearInterval(interval);
        }

        function handleClick() {
            clickCount++;

            // Even click → start rolling
            if (clickCount % 2 === 0) {
                rolling = true;
                startRolling();
            } 
            // Odd click → stop rolling
            else {
                rolling = false;
                stopRolling();
            }
        }
    </script>

</body>
</html>
